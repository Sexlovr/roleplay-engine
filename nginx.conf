# Static serving for the Roleplay Engine SPA on Hugging Face Spaces.
# HF Docker Spaces require the app to listen on the port declared as
# `app_port` in README.md (7860 here). Runs under the unprivileged nginx user.
server {
    listen       7860;
    listen       [::]:7860;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Trunk emits content-hashed asset filenames, so cache them hard.
    # (.wasm / .js / .css content-types come from the global mime.types,
    # which maps application/wasm in modern nginx — verified at build.)
    location ~* \.(wasm|js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The HTML entry must never be cached, so new deploys are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Routerless SPA: any unknown path falls back to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_types text/css application/javascript application/wasm image/svg+xml application/json;
    gzip_min_length 1024;
}
